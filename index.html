<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Application Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --primary: #10b981;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --text-light: #64748b;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      margin: 0;
      padding: 15px; /* Reduced padding for mobile */
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden; /* Prevents side-scrolling */
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    /* Client Header */
    .client-header {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      border-left: 5px solid var(--primary);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .client-header h2 { margin: 0; font-size: 1.1rem; }
    .client-header p { margin: 5px 0 0; color: var(--text-light); font-size: 0.85rem; }

    /* Stepper - Mobile Scrollable, Desktop Fixed */
    .stepper-wrapper {
      background: var(--card);
      border-radius: 12px;
      padding: 25px 15px;
      margin-bottom: 15px;
      overflow-x: auto; /* Allows swiping on small screens if steps are many */
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .stepper {
      display: flex;
      justify-content: space-between;
      min-width: 500px; /* Ensures stepper doesn't crush on mobile */
      position: relative;
    }

    .step {
      flex: 1;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .step::before {
      content: "";
      position: absolute;
      top: 12px;
      left: -50%;
      width: 100%;
      height: 2px;
      background: var(--border);
      z-index: -1;
    }

    .step:first-child::before { display: none; }

    .step-circle {
      width: 24px;
      height: 24px;
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 50%;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
    }

    .step.done .step-circle { background: var(--primary); border-color: var(--primary); color: white; }
    .step.done::before { background: var(--primary); }
    
    .step.active .step-circle {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
    }

    .step-label { font-size: 11px; font-weight: 600; color: var(--text-light); white-space: nowrap; }
    .step.done .step-label, .step.active .step-label { color: var(--text); }

    /* Main Layout */
    .main-content {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    @media (min-width: 768px) {
      .main-content { flex-direction: row; }
      .tracking-panel { flex: 2; }
      .details-panel { flex: 1; }
      .stepper-wrapper { overflow-x: hidden; }
      .stepper { min-width: auto; }
    }

    .panel {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .panel-title {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    /* Event List */
    .event {
      position: relative;
      padding-left: 30px;
      padding-bottom: 25px;
      border-left: 2px solid var(--border);
      margin-left: 10px;
    }

    .event:last-child { border-left-color: transparent; }

    .event::after {
      content: "";
      position: absolute;
      left: -7px;
      top: 0;
      width: 12px;
      height: 12px;
      background: var(--primary);
      border-radius: 50%;
      border: 2px solid white;
    }

    .event-time { font-size: 0.75rem; font-weight: 700; color: var(--text); display: block; }
    .event-desc { font-size: 0.85rem; margin-top: 4px; color: var(--text-light); }
    .event-desc strong { color: var(--text); }

    /* Side Detail Rows */
    .row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.85rem; }
    .row-label { color: var(--text-light); }
    .row-value { font-weight: 600; }

  </style>
</head>
<body>

<div class="container">
  <div class="client-header">
    <h2 id="c-name">Loading...</h2>
    <p id="c-type">Please wait</p>
  </div>

  <div class="stepper-wrapper">
    <div class="stepper" id="step-container">
      </div>
  </div>

  <div class="main-content">
    <div class="panel tracking-panel">
      <div class="panel-title">Tracking History</div>
      <div id="event-container">
        </div>
    </div>

    <div class="panel details-panel">
      <div class="panel-title">Information</div>
      <div id="info-container">
        </div>
    </div>
  </div>
</div>

<script>
  const CSV_URL = 'https://raw.githubusercontent.com/johandebeer21/Tracker-Demo/refs/heads/main/tracker2.csv';

  function parseCSV(text) {
    const lines = text.trim().split('\n').filter(l => l.trim());
    const headers = lines.shift().split(',').map(h => h.trim());
    return lines.map(line => {
      const data = line.split(',').map(d => d.trim());
      let obj = {};
      headers.forEach((h, i) => obj[h] = data[i] || '');
      return obj;
    });
  }

  function updateTracker(data) {
    if (!data.length) return;
    const current = data[0];

    // Header
    document.getElementById('c-name').textContent = `${current.Name} ${current.Surname}`;
    document.getElementById('c-type').textContent = current['Application type'];

    // Stepper Logic
    const stepBox = document.getElementById('step-container');
    stepBox.innerHTML = '';
    data.forEach((item, idx) => {
      const div = document.createElement('div');
      const isDone = item.Status === 'Done';
      const isCurrent = item.Status === 'In-progress';
      div.className = `step ${isDone ? 'done' : ''} ${isCurrent ? 'active' : ''}`;
      div.innerHTML = `
        <div class="step-circle">${isDone ? '✓' : idx + 1}</div>
        <div class="step-label">${item.Task}</div>
      `;
      stepBox.appendChild(div);
    });

    // History Logic (Reversed for latest first)
    const eventBox = document.getElementById('event-container');
    eventBox.innerHTML = '';
    [...data].reverse().forEach(item => {
      if(item.Status !== 'Not-started') {
        const ev = document.createElement('div');
        ev.className = 'event';
        ev.innerHTML = `
          <span class="event-time">${item['Updated at'] || 'Pending'}</span>
          <div class="event-desc"><strong>${item.Task}</strong><br>${item.Status}</div>
        `;
        eventBox.appendChild(ev);
      }
    });

    // Info Panel
    document.getElementById('info-container').innerHTML = `
      <div class="row"><span class="row-label">Reference</span><span class="row-value">#${current.Surname.substring(0,3).toUpperCase()}${Math.floor(Math.random()*1000)}</span></div>
      <div class="row"><span class="row-label">Assigned to</span><span class="row-value">${current.Assignee}</span></div>
      <div class="row"><span class="row-label">Next Deadline</span><span class="row-value">${current['Due date']}</span></div>
    `;
  }

  function init() {
    fetch(CSV_URL + '?nocache=' + Date.now())
      .then(r => r.text())
      .then(t => updateTracker(parseCSV(t)))
      .catch(e => console.error("Sync Error"));
  }

  init();
  setInterval(init, 30000);
</script>

</body>
</html>
