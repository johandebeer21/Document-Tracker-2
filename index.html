<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Tracker | Client Portal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --primary: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --brand-dark: #0f172a;
      --bg-page: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-page); margin: 0; color: var(--text-main); }

    .top-nav { background-color: var(--brand-dark); color: #ffffff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .nav-brand { font-weight: 700; font-size: 1.1rem; letter-spacing: 0.5px; }
    .nav-portal { font-size: 0.85rem; font-weight: 500; color: #94a3b8; text-transform: uppercase; }

    .wrapper { padding: 20px; max-width: 1000px; margin: 0 auto; }
    .card { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 20px; }

    .status-header { padding: 30px 24px; text-align: center; border-bottom: 1px solid var(--border); position: relative; }
    .status-badge { display: inline-block; background: #ecfdf5; color: #059669; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; }
    .status-header h1 { margin: 0 0 16px 0; font-size: 2.2rem; font-weight: 800; text-transform: uppercase; color: var(--brand-dark); }
    
    .client-meta { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
    .meta-item { background: var(--bg-page); padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 0.85rem; }

    .stepper-container { padding: 30px 24px; }
    .stepper { display: flex; flex-direction: column; position: relative; padding-left: 20px; border-left: 2px solid var(--border); gap: 25px; margin-left: 10px; }
    
    .step { display: flex; align-items: flex-start; position: relative; margin-left: -33px; }
    .step-circle { width: 24px; height: 24px; background: white; border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: transparent; z-index: 2; }
    .step.done .step-circle { background: var(--primary); border-color: var(--primary); color: white; }
    .step.in-progress .step-circle { border-color: var(--warning); border-width: 3px; }
    
    .step-content { margin-left: 20px; }
    .step-title { font-weight: 700; font-size: 0.9rem; color: var(--brand-dark); text-transform: uppercase; }

    .bottom-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media (min-width: 768px) { .bottom-grid { grid-template-columns: 2fr 1fr; } }

    .section-title { font-size: 0.9rem; font-weight: 700; color: var(--brand-dark); border-bottom: 1px solid var(--border); padding: 15px 24px; background: #f8fafc; text-transform: uppercase; }

    .events-feed { padding: 24px; }
    .day-group { margin-bottom: 25px; }
    .day-header { font-weight: 800; font-size: 0.95rem; color: var(--brand-dark); margin-bottom: 15px; padding-bottom: 5px; border-bottom: 1px solid #f1f5f9; }

    .event-row { display: flex; margin-bottom: 18px; align-items: flex-start; }
    .event-time { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; min-width: 85px; }
    .event-details { display: flex; flex-direction: column; }
    .event-name { font-weight: 700; font-size: 0.9rem; color: var(--brand-dark); }
    .event-status-tag { display: inline-block; font-size: 0.75rem; font-weight: 600; margin-top: 3px; }
    
    /* Dynamic Status Colors */
    .tag-done { color: var(--primary); }
    .tag-progress { color: var(--warning); }
    .tag-pending { color: var(--text-muted); }

    .sidebar-details { padding: 20px 24px; }
    .detail-row { display: flex; flex-direction: column; margin-bottom: 12px; }
    .detail-label { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
    .detail-value { font-size: 0.9rem; font-weight: 700; }
  </style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand">DOCUMENT TRACKER</div>
  <div class="nav-portal">Live Portal</div>
</nav>

<div class="wrapper">
  <div class="card">
    <div class="status-header">
      <div class="status-badge">Official Tracker</div>
      <h1 id="main-status">...</h1>
      <div class="client-meta">
        <div class="meta-item">Ref: <strong id="head-ref">---</strong></div>
        <div class="meta-item">Client: <strong id="head-client">---</strong></div>
      </div>
    </div>
    <div class="stepper-container">
      <div class="stepper" id="stepper-box"></div>
    </div>
  </div>

  <div class="bottom-grid">
    <div class="card">
      <h3 class="section-title">Timeline History</h3>
      <div class="events-feed" id="history-box"></div>
    </div>
    <div class="card">
      <h3 class="section-title">Client File</h3>
      <div class="sidebar-details" id="sidebar-box"></div>
    </div>
  </div>
</div>

<script>
  const CSV_URL = 'https://raw.githubusercontent.com/johandebeer21/Tracker-Demo/refs/heads/main/tracker2.csv';

  function parseCSV(text) {
    const lines = text.trim().split('\n').filter(l => l.trim());
    const headers = lines.shift().split(',').map(h => h.trim());
    return lines.map(line => {
      const data = line.split(',').map(d => d.trim());
      let obj = {};
      headers.forEach((h, i) => obj[h] = data[i] || '');
      return obj;
    });
  }

  function getStatusClass(status) {
    if (status === 'Done') return 'tag-done';
    if (status === 'In progress') return 'tag-progress';
    return 'tag-pending';
  }

  function render(data) {
    const client = data[0];
    const activeTasks = data.filter(d => d.Status === 'Done' || d.Status === 'In progress');
    const currentTask = activeTasks.length > 0 ? activeTasks[activeTasks.length - 1] : data[0];

    document.getElementById('main-status').textContent = currentTask.Status;
    document.getElementById('head-ref').textContent = `${client.Surname.toUpperCase()}-${client.Name[0]}313`;
    document.getElementById('head-client').textContent = `${client.Name} ${client.Surname}`;

    // Sidebar
    document.getElementById('sidebar-box').innerHTML = `
      <div class="detail-row"><span class="detail-label">Type</span><span class="detail-value">${client['Application type']}</span></div>
      <div class="detail-row"><span class="detail-label">Assignee</span><span class="detail-value">${currentTask['Assignee']}</span></div>
    `;

    // Stepper
    const stepperBox = document.getElementById('stepper-box');
    stepperBox.innerHTML = '';
    data.forEach(item => {
      const stepDiv = document.createElement('div');
      const statusClass = item.Status.toLowerCase().replace(" ", "-");
      stepDiv.className = `step ${statusClass}`;
      stepDiv.innerHTML = `<div class="step-circle">${item.Status === 'Done' ? '✓' : ''}</div>
                           <div class="step-content"><div class="step-title">${item.Task}</div></div>`;
      stepperBox.appendChild(stepDiv);
    });

    // History Feed
    const historyBox = document.getElementById('history-box');
    historyBox.innerHTML = '';
    let lastDate = "";

    [...data].reverse().forEach(item => {
      const displayDate = item['Updated at'] || "Awaiting Update";
      
      if (displayDate !== lastDate) {
        const group = document.createElement('div');
        group.className = 'day-group';
        group.innerHTML = `<div class="day-header">${displayDate}</div>`;
        historyBox.appendChild(group);
        lastDate = displayDate;
      }

      const row = document.createElement('div');
      row.className = 'event-row';
      row.innerHTML = `
        <div class="event-time">${item['Due date']}</div>
        <div class="event-details">
          <span class="event-name">${item.Task}</span>
          <span class="event-status-tag ${getStatusClass(item.Status)}">${item.Status}</span>
        </div>`;
      historyBox.lastElementChild.appendChild(row);
    });
  }

  function fetchData() {
    fetch(CSV_URL + '?nocache=' + new Date().getTime())
      .then(res => res.text())
      .then(text => render(parseCSV(text)));
  }

  fetchData();
  setInterval(fetchData, 60000);
</script>
</body>
</html>
