<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Tracker | Official Portal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --primary-done: #10b981;    /* Green */
      --in-progress: #2563eb;     /* Professional Blue */
      --not-started: #dc2626;     /* Formal Red */
      --brand-dark: #0f172a;
      --bg-page: #f8fafc;
      --card-bg: #ffffff;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-page); margin: 0; color: #1e293b; }

    /* Pulse Animation */
    @keyframes pulse-blue {
      0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
    }

    .top-nav { background-color: var(--brand-dark); color: #ffffff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .nav-brand { font-weight: 700; font-size: 1.1rem; letter-spacing: 0.5px; }

    .wrapper { padding: 20px; max-width: 1000px; margin: 0 auto; }
    .card { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 20px; }

    .status-header { padding: 30px 24px; text-align: center; border-bottom: 1px solid var(--border); position: relative; }
    .status-badge { display: inline-block; background: #f1f5f9; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
    .status-header h1 { margin: 0 0 16px 0; font-size: 2.2rem; font-weight: 800; text-transform: uppercase; color: var(--brand-dark); }
    
    .meta-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
    .meta-box { background: var(--bg-page); padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); font-size: 0.85rem; }

    /* Stepper with Pulse */
    .stepper-container { padding: 30px 24px; }
    .stepper { display: flex; flex-direction: column; position: relative; padding-left: 20px; border-left: 2px solid var(--border); gap: 25px; margin-left: 10px; }
    
    .step { display: flex; align-items: flex-start; position: relative; margin-left: -33px; }
    .step-circle { width: 24px; height: 24px; background: white; border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; transition: all 0.3s ease; }
    
    .step.done .step-circle { background: var(--primary-done); border-color: var(--primary-done); color: white; font-size: 12px; }
    .step.in-progress .step-circle { border-color: var(--in-progress); border-width: 4px; animation: pulse-blue 2s infinite; }
    
    .step-content { margin-left: 20px; }
    .step-title { font-weight: 700; font-size: 0.9rem; color: var(--brand-dark); text-transform: uppercase; }

    .bottom-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media (min-width: 768px) { .bottom-grid { grid-template-columns: 2fr 1fr; } }

    .section-title { font-size: 0.9rem; font-weight: 700; color: var(--brand-dark); border-bottom: 1px solid var(--border); padding: 15px 24px; background: #f8fafc; text-transform: uppercase; }

    /* Timeline History */
    .events-feed { padding: 24px; }
    .day-group { margin-bottom: 30px; }
    .day-header { font-weight: 800; font-size: 0.9rem; color: var(--brand-dark); margin-bottom: 15px; padding-bottom: 5px; border-bottom: 2px solid #f1f5f9; display: flex; align-items: center; gap: 8px; }

    .event-row { display: flex; margin-bottom: 18px; align-items: flex-start; }
    .event-date-col { min-width: 130px; font-size: 0.75rem; line-height: 1.4; color: var(--text-muted); font-weight: 600; }
    .event-details { display: flex; flex-direction: column; }
    .event-name { font-weight: 700; font-size: 0.95rem; color: var(--brand-dark); }
    
    /* Status Labels */
    .st-tag { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-top: 4px; padding: 2px 0; }
    .st-done { color: var(--primary-done); }
    .st-progress { color: var(--in-progress); }
    .st-not { color: var(--not-started); }

    .sidebar-details { padding: 20px 24px; }
    .detail-row { margin-bottom: 15px; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; }
    .detail-label { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-value { font-size: 0.9rem; font-weight: 700; display: block; margin-top: 2px; }
  </style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand">DOCUMENT TRACKER</div>
  <div class="nav-portal">CLIENT ACCESS</div>
</nav>

<div class="wrapper">
  <div class="card">
    <div class="status-header">
      <div class="status-badge">Live Status Report</div>
      <h1 id="main-status">...</h1>
      <div class="meta-grid">
        <div class="meta-box">Client: <strong id="head-client">---</strong></div>
        <div class="meta-box">Ref: <strong id="head-ref">---</strong></div>
      </div>
    </div>
    <div class="stepper-container">
      <div class="stepper" id="stepper-box"></div>
    </div>
  </div>

  <div class="bottom-grid">
    <div class="card">
      <h3 class="section-title">Timeline History</h3>
      <div class="events-feed" id="history-box"></div>
    </div>
    <div class="card">
      <h3 class="section-title">Case File Info</h3>
      <div class="sidebar-details" id="sidebar-box"></div>
    </div>
  </div>
</div>

<script>
  const CSV_URL = 'https://raw.githubusercontent.com/johandebeer21/Tracker-Demo/refs/heads/main/tracker2.csv';

  function parseCSV(text) {
    const lines = text.trim().split('\n').filter(l => l.trim());
    const headers = lines.shift().split(',').map(h => h.trim());
    return lines.map(line => {
      const data = line.split(',').map(d => d.trim());
      let obj = {};
      headers.forEach((h, i) => obj[h] = data[i] || '');
      return obj;
    });
  }

  function getStatusStyle(status) {
    if (status === 'Done') return 'st-done';
    if (status === 'In progress') return 'st-progress';
    return 'st-not';
  }

  function render(data) {
    const client = data[0];
    const activeTasks = data.filter(d => d.Status === 'Done' || d.Status === 'In progress');
    const currentTask = activeTasks.length > 0 ? activeTasks[activeTasks.length - 1] : data[0];

    document.getElementById('main-status').textContent = currentTask.Status;
    document.getElementById('head-client').textContent = `${client.Name} ${client.Surname}`;
    document.getElementById('head-ref').textContent = `${client.Surname.toUpperCase()}-313`;

    document.getElementById('sidebar-box').innerHTML = `
      <div class="detail-row"><span class="detail-label">Application</span><span class="detail-value">${client['Application type']}</span></div>
      <div class="detail-row"><span class="detail-label">Assigned To</span><span class="detail-value">${currentTask['Assignee']}</span></div>
    `;

    // Stepper
    const stepperBox = document.getElementById('stepper-box');
    stepperBox.innerHTML = '';
    data.forEach(item => {
      const stepDiv = document.createElement('div');
      const statusClass = item.Status === 'Done' ? 'done' : (item.Status === 'In progress' ? 'in-progress' : 'not-started');
      stepDiv.className = `step ${statusClass}`;
      stepDiv.innerHTML = `<div class="step-circle">${item.Status === 'Done' ? '✓' : ''}</div>
                           <div class="step-content"><div class="step-title">${item.Task}</div></div>`;
      stepperBox.appendChild(stepDiv);
    });

    // History
    const historyBox = document.getElementById('history-box');
    historyBox.innerHTML = '';
    let lastUpdateDate = "";

    [...data].reverse().forEach(item => {
      if (item['Updated at'] && item['Updated at'] !== lastUpdateDate) {
        const group = document.createElement('div');
        group.className = 'day-group';
        group.innerHTML = `<div class="day-header">🗓️ UPDATED: ${item['Updated at']}</div>`;
        historyBox.appendChild(group);
        lastUpdateDate = item['Updated at'];
      }

      const row = document.createElement('div');
      row.className = 'event-row';
      row.innerHTML = `
        <div class="event-date-col">
          <div>DUE: ${item['Due date']}</div>
        </div>
        <div class="event-details">
          <span class="event-name">${item.Task}</span>
          <span class="st-tag ${getStatusStyle(item.Status)}">${item.Status}</span>
        </div>`;
      historyBox.lastElementChild.appendChild(row);
    });
  }

  function fetchData() {
    fetch(CSV_URL + '?t=' + new Date().getTime())
      .then(res => res.text())
      .then(text => render(parseCSV(text)));
  }

  fetchData();
  setInterval(fetchData, 60000);
</script>
</body>
</html>
