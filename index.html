<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --primary: #10b981;
      --bg: #ffffff;
      --text: #1a1a1a;
      --text-muted: #71717a;
      --border: #f4f4f5;
    }

    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: #f4f4f5; margin: 0; padding: 12px; color: var(--text); line-height: 1.4; }

    .container { max-width: 700px; margin: 0 auto; background: var(--bg); border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow: hidden; }

    /* Main Status Header */
    .header-main { text-align: center; padding: 35px 20px 20px; border-bottom: 1px solid var(--border); }
    .header-main h1 { margin: 0; font-size: 2rem; font-weight: 800; color: #000; }
    .header-main p { margin: 6px 0; color: var(--text-muted); font-weight: 600; font-size: 0.85rem; letter-spacing: 0.5px; }

    .refresh-row { display: flex; justify-content: flex-end; padding: 10px 20px; }
    .refresh-btn { font-size: 0.8rem; font-weight: 600; cursor: pointer; color: var(--text); opacity: 0.7; }

    /* Stepper Section */
    .stepper-container { padding: 25px 30px; }
    .stepper { display: flex; flex-direction: column; gap: 28px; position: relative; }
    .stepper::before { content: ""; position: absolute; left: 11px; top: 10px; bottom: 10px; width: 2px; border-left: 2px dashed #e4e4e7; }

    .step { display: flex; align-items: flex-start; gap: 20px; position: relative; z-index: 1; }
    .step-circle { width: 24px; height: 24px; background: white; border: 2px solid #e4e4e7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; margin-top: 2px; }
    .step.done .step-circle { background: var(--primary); border-color: var(--primary); color: white; }
    
    .step-content { flex-grow: 1; }
    .step-title { font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.02em; }
    .step-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

    /* Tracking Events History */
    .history-section { padding: 25px; background-color: #fafafa; border-top: 8px solid #f4f4f5; }
    .history-section h3 { font-size: 1.25rem; font-weight: 800; margin-bottom: 20px; color: #000; }

    .event-log { border-left: 2px dashed #e4e4e7; margin-left: 8px; padding-left: 25px; position: relative; }
    
    .day-marker { font-weight: 800; font-size: 1.05rem; margin-bottom: 20px; display: block; color: #000; }
    .day-marker::before { content: "📍 "; }

    .event-item { margin-bottom: 25px; }
    /* FIXED: Using column layout on mobile to prevent overlap */
    .event-row { display: flex; flex-direction: column; gap: 4px; }
    .event-time { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
    .event-title { font-weight: 700; font-size: 0.95rem; color: #111; }
    .event-sub { font-size: 0.85rem; color: var(--text-muted); margin-top: 1px; }

    @media (min-width: 600px) {
        .event-row { flex-direction: row; gap: 20px; }
        .event-time { min-width: 80px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header-main">
    <h1 id="top-status">LOADING...</h1>
    <p id="waybill-label">REF: --</p>
  </div>

  <div class="refresh-row">
    <div class="refresh-btn" onclick="fetchData()">↻ Refresh</div>
  </div>

  <div class="stepper-container">
    <div class="stepper" id="stepper-box"></div>
  </div>

  <div class="history-section">
    <h3>Tracking events</h3>
    <div class="event-log" id="history-box"></div>
  </div>
</div>

<script>
  const CSV_URL = 'https://raw.githubusercontent.com/johandebeer21/Tracker-Demo/refs/heads/main/tracker2.csv';

  function parseCSV(text) {
    const lines = text.trim().split('\n').filter(l => l.trim());
    const headers = lines.shift().split(',').map(h => h.trim());
    return lines.map(line => {
      const data = line.split(',').map(d => d.trim());
      let obj = {};
      headers.forEach((h, i) => obj[h] = data[i] || '');
      return obj;
    });
  }

  function render(data) {
    const latest = data[data.length - 1];
    const client = data[0];
    
    // Header logic: Show the "Done" or "In-progress" big, then the application type below it
    document.getElementById('top-status').textContent = latest.Status.toUpperCase();
    document.getElementById('waybill-label').textContent = `REF: ${client.Surname.toUpperCase()}-${client.Name[0]}${Math.floor(Math.random()*1000)}`;

    // Render Stepper
    const stepperBox = document.getElementById('stepper-box');
    stepperBox.innerHTML = '';
    data.forEach(item => {
      const isDone = item.Status === 'Done';
      const isCurrent = item.Status === 'In-progress';
      const stepDiv = document.createElement('div');
      stepDiv.className = `step ${isDone ? 'done' : ''} ${isCurrent ? 'active' : ''}`;
      stepDiv.innerHTML = `
        <div class="step-circle">${isDone ? '✓' : ''}</div>
        <div class="step-content">
          <span class="step-title">${item.Task}</span>
          <span class="step-meta">${isDone ? item['Updated at'] : (isCurrent ? 'In Progress...' : 'Pending')}</span>
        </div>
      `;
      stepperBox.appendChild(stepDiv);
    });

    // Render History
    const historyBox = document.getElementById('history-box');
    historyBox.innerHTML = '';
    
    // Grouping by Date
    let currentGroupDate = "";
    
    [...data].reverse().forEach(item => {
      if (item.Status !== 'Not-started') {
        const itemDate = item['Updated at'] || "Current Status";
        
        if (itemDate !== currentGroupDate) {
          const marker = document.createElement('span');
          marker.className = 'day-marker';
          marker.textContent = itemDate;
          historyBox.appendChild(marker);
          currentGroupDate = itemDate;
        }

        const eventItem = document.createElement('div');
        eventItem.className = 'event-item';
        
        eventItem.innerHTML = `
          <div class="event-row">
            <span class="event-time">${item['Due date']}</span>
            <div class="event-info">
                <span class="event-title">${item.Task}</span>
                <span class="event-sub">${item.Status === 'Done' ? 'Completed successfully' : 'Processing...'}</span>
            </div>
          </div>
        `;
        historyBox.appendChild(eventItem);
      }
    });
  }

  function fetchData() {
    fetch(CSV_URL + '?cache=' + Date.now())
      .then(r => r.text())
      .then(t => render(parseCSV(t)))
      .catch(e => {
          document.getElementById('top-status').textContent = "OFFLINE";
          console.error(e);
      });
  }

  fetchData();
  setInterval(fetchData, 60000);
</script>

</body>
</html>
